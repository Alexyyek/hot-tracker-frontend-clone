name: Update Static Data

on:
  workflow_dispatch:
  schedule:
    - cron: "7,37 * * * *"

permissions:
  contents: write

concurrency:
  group: update-static-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect latest data
        run: npm run collect:data
        env:
          WEIXIN_FEED_SOURCES_JSON: ${{ secrets.WEIXIN_FEED_SOURCES_JSON }}
          WEIXIN_SEARCH_LIMIT_PER_SOURCE: "1"

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update static hot tracker data"
          file_pattern: public/data/*.json public/data/daily/*.json
