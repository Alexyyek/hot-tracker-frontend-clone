name: Update Static Data

on:
  workflow_dispatch:
  schedule:
    - cron: "7,37 * * * *"

permissions:
  contents: write

concurrency:
  group: update-static-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect latest data
        timeout-minutes: 15
        run: npm run collect:data
        env:
          COLLECTOR_REQUEST_TIMEOUT_MS: "15000"
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          RSSHUB_BASE_URL: ${{ secrets.RSSHUB_BASE_URL }}
          RSSHUB_BASE_URLS: ${{ secrets.RSSHUB_BASE_URLS }}
          WEIXIN_FEED_SOURCES_JSON: ${{ secrets.WEIXIN_FEED_SOURCES_JSON }}
          WEIXIN_RSSHUB_SOURCES_JSON: ${{ secrets.WEIXIN_RSSHUB_SOURCES_JSON }}
          WEIXIN_SEARCH_LIMIT_PER_SOURCE: "1"

      - name: Check whether main advanced during collection
        id: remote_check
        run: |
          git fetch origin main
          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]]; then
            echo "Remote main advanced during collection; skipping stale data commit."
            echo "skip_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_commit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated data
        if: steps.remote_check.outputs.skip_commit != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update static hot tracker data"
          file_pattern: public/data/*.json public/data/daily/*.json
