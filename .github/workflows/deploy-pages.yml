name: Deploy GitHub Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update Static Data"]
    types: [completed]
    branches:
      - main
  push:
    branches:
      - main
    paths-ignore:
      - "public/data/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BASE_PATH: /
          VITE_DATA_MODE: static

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy_primary.outputs.page_url || steps.deploy_retry_one.outputs.page_url || steps.deploy_retry_two.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deploy_primary
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000

      - name: Wait before Pages deploy retry
        if: steps.deploy_primary.outcome == 'failure'
        run: sleep 60

      - name: Retry Pages deployment
        id: deploy_retry_one
        if: steps.deploy_primary.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000

      - name: Wait before final Pages deploy retry
        if: steps.deploy_primary.outcome == 'failure' && steps.deploy_retry_one.outcome == 'failure'
        run: sleep 120

      - name: Final Pages deployment retry
        id: deploy_retry_two
        if: steps.deploy_primary.outcome == 'failure' && steps.deploy_retry_one.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000

      - name: Verify Pages deployment
        if: always()
        run: |
          if [[ "${{ steps.deploy_primary.outcome }}" == "success" || "${{ steps.deploy_retry_one.outcome }}" == "success" || "${{ steps.deploy_retry_two.outcome }}" == "success" ]]; then
            exit 0
          fi
          exit 1
